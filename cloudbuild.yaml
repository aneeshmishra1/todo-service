serviceAccount: projects/project-7f7e50ff-c654-4c24-867/serviceAccounts/todo-service-build-sa@project-7f7e50ff-c654-4c24-867.iam.gserviceaccount.com
steps:

# Step 1: Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '-t',
      'asia-south1-docker.pkg.dev/project-7f7e50ff-c654-4c24-867/my-first-artifact-registry/todo-service:$SHORT_SHA',
      '.'
    ]

# Step 2: Push image
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'push',
      'asia-south1-docker.pkg.dev/project-7f7e50ff-c654-4c24-867/my-first-artifact-registry/todo-service:$SHORT_SHA'
    ]

# Step 3: Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    [
      'run',
      'deploy', 'todo-service',
      '--image', 'asia-south1-docker.pkg.dev/project-7f7e50ff-c654-4c24-867/my-first-artifact-registry/todo-service:$SHORT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--service-account','todo-service-runtime-sa@project-7f7e50ff-c654-4c24-867.iam.gserviceaccount.com',
      '--allow-unauthenticated'
    ]

images:
- 'asia-south1-docker.pkg.dev/project-7f7e50ff-c654-4c24-867/my-first-artifact-registry/todo-service:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY


